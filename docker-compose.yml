services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DB_NAME: wordpress
      STITCH_API_KEY: ${STITCH_API_KEY:-AQ.Ab8RN6Lg5osvzyXTZ6ipnHxaAYnE2h7tlAimsQfhk0azDfGxlA}
      STITCH_HOST: ${STITCH_HOST:-https://stitch.googleapis.com/mcp}
    volumes:
      - .:/var/www/html/wp-content/plugins/stitch-to-bricks
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - db

volumes:
  db_data:
